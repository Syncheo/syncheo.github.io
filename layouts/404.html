<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">

  <head>
    {{ partial "headers.html" . }}
    {{ partial "custom_headers.html" . }}
    <script>
    (function () {
      /* Anciennes URLs FR sans préfixe de langue (ex. /services/) :
         depuis le passage de fr en sous-répertoire, tout le contenu vit
         sous /fr/, /en/ ou /de/. On redirige vers la langue choisie
         (localStorage) ou celle du navigateur. Si l'URL contient déjà
         un préfixe de langue, c'est un vrai 404 : on affiche la page. */
      var path = window.location.pathname;
      if (/^\/(fr|en|de)(\/|$)/.test(path)) return;

      var lang = null;
      try { lang = localStorage.getItem("site_lang"); } catch (e) {}
      if (["fr", "en", "de"].indexOf(lang) === -1) {
        var navLang = (navigator.language || navigator.userLanguage || "").toLowerCase();
        if (navLang.indexOf("en") === 0) lang = "en";
        else if (navLang.indexOf("de") === 0) lang = "de";
        else lang = "fr";
      }

      window.location.replace("/" + lang + path + window.location.search + window.location.hash);
    })();
    </script>
  </head>

  <body>

    <div id="all">

        {{ partial "top.html" . }}

        {{ partial "nav.html" . }}

        <div id="content">
            <div class="container">

                <div class="col-sm-6 col-sm-offset-3" id="error-page">

                    <div class="box">

                        <h3>{{ i18n "404Message" | markdownify }}</h3>
                        <h4 class="text-muted">{{ i18n "404Error" | markdownify }}</h4>

                        <p class="buttons"><a href="{{ "/" | relLangURL }}" class="btn btn-template-main"><i class="fas fa-home"></i> {{ i18n "404NavHome" | markdownify }}</a>
                        </p>
                    </div>


                </div>
                <!-- /.col-sm-6 -->
            </div>
            <!-- /.container -->
        </div>
        <!-- /#content -->

        {{ partial "footer.html" . }}

    </div>
  </body>
</html>
