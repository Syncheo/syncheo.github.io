<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">

  <head>
    {{ partial "headers.html" . }}
    {{ partial "custom_headers.html" . }}
  </head>

  <body>

    <div id="all">

        {{ partial "top.html" . }}

        {{ partial "nav.html" . }}

        {{ partial "header.html" . }}

        <div id="content">
            <div class="container">

                <div class="row">

                    <div class="col-md-9" id="blog-post">

                        <div id="post-content">
                          {{ .Content }}
                        </div>

                        {{ partial "cta-contact.html" . }}

                    </div>

                    <div class="col-md-3">
                        {{ partial "sidebar.html" . }}
                    </div>

                </div>

            </div>
        </div>

        {{ partial "footer.html" . }}

    </div>

    {{ partial "scripts.html" . }}

  </body>
</html>
