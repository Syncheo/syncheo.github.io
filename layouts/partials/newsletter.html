<section class="sy-newsletter-section">
  <div class="container">
    <div class="row" style="align-items: center;">

      <div class="col-md-5" style="margin-bottom: 32px;">
        <h2 class="sy-newsletter-title">{{ i18n "newsletter_title" }}</h2>
        <p class="sy-newsletter-desc">{{ i18n "newsletter_desc" }}</p>
      </div>

      <div class="col-md-7">
        <div id="sib-form-container" class="sib-form-container">

          <div id="error-message" class="sib-form-message-panel sy-newsletter-msg sy-newsletter-msg--error">
            <div class="sib-form-message-panel__text sib-form-message-panel__text--center">
              <svg viewBox="0 0 512 512" class="sib-icon sib-notification__icon" style="width:18px;height:18px;fill:currentColor;">
                <path d="M256 40c118.621 0 216 96.075 216 216 0 119.291-96.61 216-216 216-119.244 0-216-96.562-216-216 0-119.203 96.602-216 216-216m0-32C119.043 8 8 119.083 8 256c0 136.997 111.043 248 248 248s248-111.003 248-248C504 119.083 392.957 8 256 8zm-11.49 120h22.979c6.823 0 12.274 5.682 11.99 12.5l-7 168c-.268 6.428-5.556 11.5-11.99 11.5h-8.979c-6.433 0-11.722-5.073-11.99-11.5l-7-168c-.283-6.818 5.167-12.5 11.99-12.5zM256 340c-15.464 0-28 12.536-28 28s12.536 28 28 28 28-12.536 28-28-12.536-28-28-28z"/>
              </svg>
              <span class="sib-form-message-panel__inner-text">{{ i18n "newsletter_error" }}</span>
            </div>
          </div>

          <div id="success-message" class="sib-form-message-panel sy-newsletter-msg sy-newsletter-msg--success">
            <div class="sib-form-message-panel__text sib-form-message-panel__text--center">
              <svg viewBox="0 0 512 512" class="sib-icon sib-notification__icon" style="width:18px;height:18px;fill:currentColor;">
                <path d="M256 8C119.033 8 8 119.033 8 256s111.033 248 248 248 248-111.033 248-248S392.967 8 256 8zm0 464c-118.664 0-216-96.055-216-216 0-118.663 96.055-216 216-216 118.664 0 216 96.055 216 216 0 118.663-96.055 216-216 216zm141.63-274.961L217.15 376.071c-4.705 4.667-12.303 4.637-16.97-.068l-85.878-86.572c-4.667-4.705-4.637-12.303.068-16.97l8.52-8.451c4.705-4.667 12.303-4.637 16.97.068l68.976 69.533 163.441-162.13c4.705-4.667 12.303-4.637 16.97.068l8.451 8.52c4.668 4.705 4.637 12.303-.068 16.97z"/>
              </svg>
              <span class="sib-form-message-panel__inner-text">{{ i18n "newsletter_success" }}</span>
            </div>
          </div>

          <div id="sib-container" class="sib-container--large sib-container--vertical sy-newsletter-form-container">
            <form id="sib-form" method="POST"
              action="https://538fa9ef.sibforms.com/serve/MUIFAOQpW6RzTjUrjfcBnCZNPdpUQRtQKIwVOXkn15LLr5kZv3NN8xNLhJy31ShXOHVCxw2DOqX7uSCGstW4NixMtBE2HsXob2KZHJZUnVzOUIYQH2-3j5t_CccpvOLALl8ZNKLy5g58P6sg81GuR_Mxxg_yu10kBsrQV2o0l-jQF52zIQcVXi2yC2LbiWxbJ0ylwpGPfuT5i25ezA=="
              data-type="subscription">

              <div class="sy-newsletter-input-row">
                <div class="sib-input sy-newsletter-input-wrap">
                  <div class="form__entry entry_block">
                    <div class="form__label-row">
                      <div class="entry__field">
                        <input
                          class="input sy-newsletter-input"
                          type="text"
                          id="EMAIL"
                          name="EMAIL"
                          autocomplete="email"
                          value=""
                          placeholder="{{ i18n "newsletter_placeholder" }}"
                          data-required="true"
                          required
                        />
                      </div>
                    </div>
                    <label class="entry__error entry__error--primary sy-newsletter-entry-error"></label>
                  </div>
                </div>

                <button
                  class="sib-form-block__button sib-form-block__button-with-loader sy-newsletter-btn btn btn-template-main"
                  form="sib-form"
                  type="submit">
                  <svg class="icon clickable__icon progress-indicator__icon sib-hide-loader-icon" viewBox="0 0 512 512" style="width:16px;height:16px;fill:currentColor;margin-right:6px;">
                    <path d="M460.116 373.846l-20.823-12.022c-5.541-3.199-7.54-10.159-4.663-15.874 30.137-59.886 28.343-131.652-5.386-189.946-33.641-58.394-94.896-95.833-161.827-99.676C261.028 55.961 256 50.751 256 44.352V20.309c0-6.904 5.808-12.337 12.703-11.982 83.556 4.306 160.163 50.864 202.11 123.677 42.063 72.696 44.079 162.316 6.031 236.832-3.14 6.148-10.75 8.461-16.728 5.01z"/>
                  </svg>
                  {{ i18n "newsletter_cta" }}
                </button>
              </div>

              <input type="text" name="email_address_check" value="" class="input--hidden">
              <input type="hidden" name="locale" value="{{ .Lang }}">
            </form>
          </div>

        </div>
      </div>

    </div>
  </div>
</section>
