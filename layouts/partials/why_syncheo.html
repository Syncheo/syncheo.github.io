{{ with .Params.why }}
<section class="section-home-alt">
  <div class="container">
    <h2 class="section-heading">{{ .title }}</h2>
    <p class="section-lead">{{ .subtitle }}</p>
    <div class="row">
      <div class="col-md-6" style="margin-bottom:20px;">
        <div class="why-card">
          <h3>{{ .specialized.title }}</h3>
          <ul>
            {{ range .specialized.items }}<li>{{ . }}</li>{{ end }}
          </ul>
        </div>
      </div>
      <div class="col-md-6" style="margin-bottom:20px;">
        <div class="why-card">
          <h3>{{ .business.title }}</h3>
          <ul>
            {{ range .business.items }}<li>{{ . }}</li>{{ end }}
          </ul>
        </div>
      </div>
    </div>
  </div>
</section>
{{ end }}
